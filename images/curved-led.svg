<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Curved flexible LED wall showing an immersive winter-forest scene">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05131f"/>
      <stop offset="0.55" stop-color="#0a3145"/>
      <stop offset="1" stop-color="#0e5750"/>
    </linearGradient>
    <radialGradient id="topglow" cx="0.5" cy="0.18" r="0.6">
      <stop offset="0" stop-color="#bfefff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#bfefff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e5750" stop-opacity="0"/>
      <stop offset="1" stop-color="#02161a" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.2"/>
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#sky)"/>
  <ellipse cx="400" cy="110" rx="430" ry="200" fill="url(#topglow)"/>

  <!-- faint LED module seams -->
  <g stroke="#ffffff" stroke-opacity="0.04">
    <path d="M100 0V600M200 0V600M300 0V600M400 0V600M500 0V600M600 0V600M700 0V600"/>
    <path d="M0 150H800M0 300H800M0 450H800" stroke-opacity="0.03"/>
  </g>

  <!-- bare winter trees -->
  <g stroke="#0a2630" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.9">
    <path d="M165 590V330 M165 400L120 360 M165 400L210 362 M165 360L132 328 M165 360L198 330 M165 330L150 305 M165 330L184 305"/>
    <path d="M420 590V300 M420 380L368 338 M420 380L474 340 M420 332L382 298 M420 332L460 300 M420 298L402 272 M420 298L440 272"/>
    <path d="M650 590V350 M650 410L612 376 M650 410L690 378 M650 372L622 344 M650 372L680 346"/>
  </g>

  <!-- glowing bokeh + fairy lights -->
  <g filter="url(#soft)" fill="#eafcff">
    <circle cx="120" cy="180" r="6" opacity="0.85"/>
    <circle cx="190" cy="250" r="3" opacity="0.7"/>
    <circle cx="250" cy="150" r="8" opacity="0.8"/>
    <circle cx="300" cy="320" r="4" opacity="0.6"/>
    <circle cx="350" cy="200" r="5" opacity="0.85"/>
    <circle cx="410" cy="160" r="9" opacity="0.9"/>
    <circle cx="455" cy="270" r="3" opacity="0.6"/>
    <circle cx="500" cy="190" r="6" opacity="0.8"/>
    <circle cx="540" cy="120" r="4" opacity="0.7"/>
    <circle cx="585" cy="240" r="7" opacity="0.8"/>
    <circle cx="630" cy="170" r="5" opacity="0.85"/>
    <circle cx="690" cy="230" r="9" opacity="0.75"/>
    <circle cx="730" cy="150" r="4" opacity="0.7"/>
    <circle cx="150" cy="330" r="3" opacity="0.6"/>
    <circle cx="220" cy="400" r="5" opacity="0.7"/>
    <circle cx="380" cy="360" r="3" opacity="0.55"/>
    <circle cx="470" cy="380" r="6" opacity="0.7"/>
    <circle cx="560" cy="350" r="4" opacity="0.6"/>
    <circle cx="660" cy="300" r="5" opacity="0.7"/>
    <circle cx="720" cy="380" r="3" opacity="0.55"/>
    <circle cx="90" cy="260" r="4" opacity="0.7"/>
    <circle cx="330" cy="110" r="3" opacity="0.7"/>
    <circle cx="610" cy="100" r="5" opacity="0.75"/>
    <circle cx="270" cy="430" r="4" opacity="0.5"/>
  </g>
  <g fill="#ffffff">
    <circle cx="410" cy="160" r="2.2"/>
    <circle cx="250" cy="150" r="2"/>
    <circle cx="690" cy="230" r="2"/>
    <circle cx="120" cy="180" r="1.8"/>
  </g>

  <!-- floor reflection -->
  <rect y="470" width="800" height="130" fill="url(#floor)"/>
</svg>
